version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: revibe-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: revibe
      POSTGRES_PASSWORD: revibe
      POSTGRES_DB: revibe
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: revibe-redis
    ports:
      - "6379:6379"

volumes:
  pgdata:
